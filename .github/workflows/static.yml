name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        run: |
          # Заменяем плейсхолдер на реальный ключ из Secrets
          sed -i "s|GEMINI_KEY_PLACEHOLDER|${{ secrets.GEMINI_API_KEY }}|g" index.html
          
          # Проверяем что замена произошла
          if grep -q "GEMINI_KEY_PLACEHOLDER" index.html; then
            echo "❌ ОШИБКА: Плейсхолдер не заменился!"
            exit 1
          else
            echo "✅ Ключ успешно вставлен"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
