name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        run: |
          echo "🔍 Ищу плейсхолдер в sth_dashboard.html..."
          
          # Показываем строку с ключом ДО замены
          grep -n "GEMINI_KEY" sth_dashboard.html | head -3
          
          echo ""
          echo "✅ Заменяю плейсхолдер на ключ из секретов..."
          
          # Заменяем ТОЛЬКО текст внутри кавычек
          sed -i "s|GEMINI_KEY_PLACEHOLDER|${{ secrets.GEMINI_KEY_PLACEHOLDER }}|g" sth_dashboard.html
          
          echo ""
          echo "📁 Проверяем результат:"
          grep -n "GEMINI_KEY" sth_dashboard.html | head -3
          
          echo ""
          echo "🔍 Проверяю, что плейсхолдер заменён:"
          if grep -q "GEMINI_KEY_PLACEHOLDER" sth_dashboard.html; then
            echo "❌ ОШИБКА: Плейсхолдер всё ещё в файле!"
            exit 1
          else
            echo "✅ Плейсхолдер успешно заменён"
          fi
          
          echo ""
          echo "🔍 Проверяю, что ключ появился (первые 10 символов):"
          grep -o "AIza[0-9A-Za-z]*" sth_dashboard.html | head -1 | cut -c1-10 || echo "⚠️ Ключ не найден, но это нормально если он начинается не с AIza"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
